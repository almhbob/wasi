packages:
  "framer-motion": "For page transitions, smooth modal reveals, and elegant UI interactions"
  "clsx": "For composing tailwind classes conditionally"
  "tailwind-merge": "For merging tailwind classes without conflicts"
  "date-fns": "For formatting dates in the dead-man switch and history logs"
  "lucide-react": "For UI icons"

images:
  - path: "artifacts/wasi-app/public/images/auth-bg.png"
    description: "Elegant, serene Islamic geometric pattern background in deep emerald green and soft warm gold, subtle lighting, highly premium and minimal, blurred edges"
    aspect_ratio: "16:9"
  - path: "artifacts/wasi-app/public/images/vault-decor.png"
    description: "Abstract, modern minimalist line art of a protective shield or vault incorporating subtle arabesque motifs, warm gold on transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/wasi-app/public/images/quran-ornament.png"
    description: "Beautiful, subtle, minimalist gold geometric ornament used for text decoration in Islamic manuscripts, transparent background"
    aspect_ratio: "16:9"

notes:
  - Using a global fetch interceptor to attach the JWT token since API client is auto-generated.
  - Using standard wouter for routing.
  - App is exclusively RTL (Right-to-Left) Arabic.
