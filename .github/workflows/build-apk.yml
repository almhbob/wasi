name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK locally
        working-directory: artifacts/wasi-mobile
        run: |
          eas build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output ./wasi-preview.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wasi-preview-apk
          path: artifacts/wasi-mobile/wasi-preview.apk
          retention-days: 30
